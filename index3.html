<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS - Your AI Assistant">
    <meta name="theme-color" content="#0a2540">
    
    <title>JARVIS - AI Assistant</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Stark Industries Upload Button Styling */
        .upload-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .upload-btn {
            position: relative;
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: visible;
        }
        /* Holographic hexagon background */
        .upload-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.15) 0%, rgba(0, 153, 204, 0.05) 100%);
            border: 1.5px solid rgba(0, 217, 255, 0.4);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            transition: all 0.3s ease;
            box-shadow: 
                0 0 10px rgba(0, 217, 255, 0.3),
                inset 0 0 10px rgba(0, 217, 255, 0.1);
        }
        /* PDF button - gold accent like Stark tech */
        .upload-btn.pdf-btn::before {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.15) 0%, rgba(204, 136, 0, 0.05) 100%);
            border-color: rgba(255, 170, 0, 0.4);
            box-shadow: 
                0 0 10px rgba(255, 170, 0, 0.3),
                inset 0 0 10px rgba(255, 170, 0, 0.1);
        }
        /* Icon styling */
        .upload-btn svg {
            position: relative;
            z-index: 2;
            stroke: #00d9ff;
            filter: drop-shadow(0 0 4px rgba(0, 217, 255, 0.6));
            transition: all 0.3s ease;
        }
        .upload-btn.pdf-btn svg {
            stroke: #ffaa00;
            filter: drop-shadow(0 0 4px rgba(255, 170, 0, 0.6));
        }
        /* Hover effects - holographic glow */
        .upload-btn:hover::before {
            border-color: #00d9ff;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.25) 0%, rgba(0, 153, 204, 0.15) 100%);
            box-shadow: 
                0 0 20px rgba(0, 217, 255, 0.6),
                inset 0 0 15px rgba(0, 217, 255, 0.2);
            transform: scale(1.05);
        }
        .upload-btn.pdf-btn:hover::before {
            border-color: #ffaa00;
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.25) 0%, rgba(204, 136, 0, 0.15) 100%);
            box-shadow: 
                0 0 20px rgba(255, 170, 0, 0.6),
                inset 0 0 15px rgba(255, 170, 0, 0.2);
        }
        .upload-btn:hover svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(0, 217, 255, 1));
        }
        .upload-btn.pdf-btn:hover svg {
            filter: drop-shadow(0 0 8px rgba(255, 170, 0, 1));
        }
        .upload-btn:active {
            transform: scale(0.95);
        }
        /* Scanning line animation on hover */
        .upload-btn::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d9ff, transparent);
            opacity: 0;
            transition: all 0.6s ease;
        }
        .upload-btn:hover::after {
            top: 100%;
            opacity: 1;
        }
        .upload-btn.pdf-btn::after {
            background: linear-gradient(90deg, transparent, #ffaa00, transparent);
        }
        /* File Preview Styling */
        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            padding: 0;
        }
        .preview-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 217, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.3);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(10px);
        }
        .preview-item:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }
        .preview-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(0, 217, 255, 0.4);
        }
        .pdf-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00d9ff;
        }
        .pdf-preview svg {
            stroke: #ffaa00;
            filter: drop-shadow(0 0 3px rgba(255, 170, 0, 0.5));
        }
        .pdf-preview span {
            font-size: 13px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #00d9ff;
            text-shadow: 0 0 5px rgba(0, 217, 255, 0.5);
        }
        .remove-file {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 51, 102, 0.8);
            border: 1px solid rgba(255, 51, 102, 0.6);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.4);
        }
        .remove-file:hover {
            background: #ff3366;
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.8);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Tooltip styling */
        .upload-btn {
            position: relative;
        }
        .upload-btn[title]:hover::before {
            content: attr(title);
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 217, 255, 0.95);
            color: #0a0e27;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.5);
            animation: fadeIn 0.2s ease-in;
            pointer-events: none;
        }
        .upload-btn.pdf-btn[title]:hover::before {
            background: rgba(255, 170, 0, 0.95);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* Mobile responsive */
        @media (max-width: 768px) {
            .upload-btn {
                width: 40px;
                height: 40px;
            }
            .upload-btn svg {
                width: 18px;
                height: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Header with Status -->
    <header class="header">
        <div class="header-content">
            <h1 class="title">
                <span class="arc-reactor"></span>
                JARVIS
            </h1>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
            </div>
        </div>
    </header>

    <!-- Main Chat Container -->
    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-content">
                    <p id="greetingMessage">Good evening, Sir. JARVIS online and ready to assist.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="input-container">
        <div class="input-wrapper">
            <!-- Stark Industries Holographic Upload Buttons -->
            <div class="upload-buttons">
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                <button id="imageBtn" class="upload-btn image-btn" title="Upload Images">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>

                <input type="file" id="pdfInput" accept=".pdf" multiple style="display: none;">
                <button id="pdfBtn" class="upload-btn pdf-btn" title="Upload PDFs">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>
                </button>
            </div>

            <textarea 
                id="messageInput" 
                class="message-input" 
                placeholder="Ask JARVIS anything..."
                rows="1"
            ></textarea>
            
            <button id="sendBtn" class="send-btn" title="Send message">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <!-- File Preview Area -->
        <div id="filePreview" class="file-preview"></div>
    </div>

    <!-- Voice Controls -->
    <div class="voice-controls">
        <button id="voiceBtn" class="voice-btn" title="Click or hold Space to talk">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        
        <div class="voice-toggle">
            <label>
                <input type="checkbox" id="conversationMode">
                <span class="toggle-slider"></span>
                <span class="toggle-text">Conversation</span>
            </label>
        </div>
        
        <div id="voiceStatus" class="voice-status"></div>
    </div>

    <!-- Scripts -->
    <script src="voice.js"></script>
    <script>
        const API_BASE = 'https://jarvis-backend-j123.onrender.com';
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const imageInput = document.getElementById('imageInput');
        const imageBtn = document.getElementById('imageBtn');
        const pdfInput = document.getElementById('pdfInput');
        const pdfBtn = document.getElementById('pdfBtn');
        const filePreview = document.getElementById('filePreview');
        const greetingMessage = document.getElementById('greetingMessage');

        let uploadedFiles = [];
        let conversationHistory = []; // Store full conversation locally

        // Auto-scroll function with smooth behavior
        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesContainer.scrollTo({
                    top: messagesContainer.scrollHeight,
                    behavior: 'smooth'
                });
            });
        }

        // Dynamic greeting based on time of day
        function setDynamicGreeting() {
            const hour = new Date().getHours();
            let greeting;
            
            if (hour >= 5 && hour < 12) {
                greeting = 'Good morning';
            } else if (hour >= 12 && hour < 17) {
                greeting = 'Good afternoon';
            } else if (hour >= 17 && hour < 22) {
                greeting = 'Good evening';
            } else {
                greeting = 'Good evening';
            }
            
            greetingMessage.textContent = `${greeting}, Sir. JARVIS online and ready to assist.`;
        }

        // Set greeting on load
        setDynamicGreeting();

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Send message on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        // Image upload button
        imageBtn.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', handleImageUpload);

        // PDF upload button
        pdfBtn.addEventListener('click', () => pdfInput.click());
        pdfInput.addEventListener('change', handlePDFUpload);

        // Test backend connection
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    statusDot.className = 'status-dot';
                } else {
                    statusDot.className = 'status-dot error';
                }
            } catch (error) {
                statusDot.className = 'status-dot offline';
            }
        }

        // Test connection on load and periodically
        testConnection();
        setInterval(testConnection, 30000);

        // Handle image upload
        function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedFiles.push({
                            type: 'image',
                            data: event.target.result,
                            name: file.name
                        });
                        displayFilePreview(file, event.target.result, 'image');
                    };
                    reader.readAsDataURL(file);
                }
            });
            imageInput.value = '';
        }

        // Handle PDF upload
        function handlePDFUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type === 'application/pdf') {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedFiles.push({
                            type: 'pdf',
                            data: event.target.result,
                            name: file.name
                        });
                        displayFilePreview(file, event.target.result, 'pdf');
                    };
                    reader.readAsDataURL(file);
                }
            });
            pdfInput.value = '';
        }

        // Display file preview
        function displayFilePreview(file, data, type) {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';

            if (type === 'image') {
                previewItem.innerHTML = `
                    <img src="${data}" alt="${file.name}">
                    <span style="color: #00d9ff; font-size: 13px; text-shadow: 0 0 5px rgba(0, 217, 255, 0.5);">${file.name}</span>
                    <button class="remove-file" onclick="removeFile('${file.name}')">×</button>
                `;
            } else if (type === 'pdf') {
                previewItem.innerHTML = `
                    <div class="pdf-preview">
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>${file.name}</span>
                    </div>
                    <button class="remove-file" onclick="removeFile('${file.name}')">×</button>
                `;
            }

            filePreview.appendChild(previewItem);
        }

        // Remove file from upload queue
        window.removeFile = function(filename) {
            uploadedFiles = uploadedFiles.filter(f => f.name !== filename);
            const previews = filePreview.querySelectorAll('.preview-item');
            previews.forEach(preview => {
                if (preview.textContent.includes(filename)) {
                    preview.remove();
                }
            });
        };

        // Build conversation context string from history
        function buildConversationContext() {
            if (conversationHistory.length === 0) return '';
            
            let context = '\n\nPrevious conversation:\n';
            conversationHistory.forEach(msg => {
                const role = msg.role === 'user' ? 'User' : 'JARVIS';
                context += `${role}: ${msg.content}\n`;
            });
            return context;
        }

        // Send message function with conversation context
        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message && uploadedFiles.length === 0) return;

            // Prepare message content
            let displayMessage = message || 'Analyzing uploaded files...';
            
            // Add user message to chat
            addMessage('user', displayMessage);
            
            // Add to conversation history
            conversationHistory.push({
                role: 'user',
                content: displayMessage
            });

            // Show file previews in chat if any
            if (uploadedFiles.length > 0) {
                uploadedFiles.forEach(file => {
                    if (file.type === 'image') {
                        addImageToChat(file.data, file.name);
                    } else if (file.type === 'pdf') {
                        addPDFToChat(file.name);
                    }
                });
            }

            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Show typing indicator
            const typingId = addTypingIndicator();

            try {
                // Build message with conversation context
                const contextualMessage = message + buildConversationContext();

                const requestBody = {
                    message: contextualMessage,
                    user: 'Jakob Brunsell',
                    files: uploadedFiles.length > 0 ? uploadedFiles : undefined
                };

                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                removeTypingIndicator(typingId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const assistantResponse = data.text || data.response || 'No response received';
                
                addMessage('assistant', assistantResponse);
                
                // Add assistant response to conversation history
                conversationHistory.push({
                    role: 'assistant',
                    content: assistantResponse
                });

                // Keep only last 10 exchanges (20 messages) to avoid token limits
                if (conversationHistory.length > 20) {
                    conversationHistory = conversationHistory.slice(-20);
                }

                console.log(`✅ Conversation: ${conversationHistory.length} messages`);

            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'I encountered an error processing your request, Sir. Please try again.');
                console.error('Error:', error);
            }

            // Clear uploaded files
            uploadedFiles = [];
            filePreview.innerHTML = '';
        }

        // Add message to chat with auto-scroll
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const p = document.createElement('p');
            p.textContent = content;
            
            contentDiv.appendChild(p);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Auto-scroll to bottom
            scrollToBottom();
        }

        // Add image to chat with auto-scroll
        function addImageToChat(data, name) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const img = document.createElement('img');
            img.src = data;
            img.alt = name;
            img.style.maxWidth = '300px';
            img.style.borderRadius = '8px';
            
            contentDiv.appendChild(img);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Auto-scroll to bottom
            scrollToBottom();
        }

        // Add PDF indicator to chat with auto-scroll
        function addPDFToChat(name) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>${name}</span>
                </div>
            `;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Auto-scroll to bottom
            scrollToBottom();
        }

        // Add typing indicator with auto-scroll
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.id = 'typing-' + Date.now();
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            typingDiv.appendChild(contentDiv);
            messagesContainer.appendChild(typingDiv);
            
            // Auto-scroll to bottom
            scrollToBottom();
            
            return typingDiv.id;
        }

        // Remove typing indicator
        function removeTypingIndicator(id) {
            const typingDiv = document.getElementById(id);
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        // Listen for voice messages
        window.addEventListener('addMessage', (event) => {
            const { role, content } = event.detail;
            addMessage(role, content);
            
            // Add to conversation history
            conversationHistory.push({
                role: role,
                content: content
            });
        });

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
