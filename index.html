<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS - Your AI Assistant">
    <meta name="theme-color" content="#0a2540">
    
    <title>JARVIS - AI Assistant</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with Status -->
    <header class="header">
        <div class="header-content">
            <h1 class="title">
                <span class="arc-reactor"></span>
                JARVIS
            </h1>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- Main Chat Container -->
    <main class="chat-container">
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-content">
                    <p>Good evening, Jakob. JARVIS online and ready to assist.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="input-container">
        <div class="input-wrapper">
            <!-- File Upload Buttons -->
            <div class="upload-buttons">
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                <button id="imageBtn" class="upload-btn" title="Upload images">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </button>

                <input type="file" id="pdfInput" accept=".pdf" multiple style="display: none;">
                <button id="pdfBtn" class="upload-btn" title="Upload PDFs">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
            </div>

            <textarea 
                id="messageInput" 
                class="message-input" 
                placeholder="Ask JARVIS anything..."
                rows="1"
            ></textarea>
            
            <button id="sendBtn" class="send-btn" title="Send message">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <!-- File Preview Area -->
        <div id="filePreview" class="file-preview"></div>
    </div>

    <!-- Voice Controls -->
    <div class="voice-controls">
        <button id="voiceBtn" class="voice-btn" title="Click or hold Space to talk">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        
        <div class="voice-toggle">
            <label>
                <input type="checkbox" id="conversationMode">
                <span class="toggle-slider"></span>
                <span class="toggle-text">Conversation</span>
            </label>
        </div>
        
        <div id="voiceStatus" class="voice-status"></div>
    </div>

    <!-- Scripts -->
    <script src="voice.js"></script>
    <script>
        const API_BASE = 'https://jarvis-backend-j123.onrender.com';
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const imageInput = document.getElementById('imageInput');
        const imageBtn = document.getElementById('imageBtn');
        const pdfInput = document.getElementById('pdfInput');
        const pdfBtn = document.getElementById('pdfBtn');
        const filePreview = document.getElementById('filePreview');

        let uploadedFiles = [];

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // Send message on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send button click
        sendBtn.addEventListener('click', sendMessage);

        // Image upload button
        imageBtn.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', handleImageUpload);

        // PDF upload button
        pdfBtn.addEventListener('click', () => pdfInput.click());
        pdfInput.addEventListener('change', handlePDFUpload);

        // Test backend connection
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Online';
                } else {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Error';
                }
            } catch (error) {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            }
        }

        // Test connection on load and periodically
        testConnection();
        setInterval(testConnection, 30000);

        // Handle image upload
        function handleImageUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedFiles.push({
                            type: 'image',
                            data: event.target.result,
                            name: file.name
                        });
                        displayFilePreview(file, event.target.result, 'image');
                    };
                    reader.readAsDataURL(file);
                }
            });
            imageInput.value = '';
        }

        // Handle PDF upload
        function handlePDFUpload(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                if (file.type === 'application/pdf') {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedFiles.push({
                            type: 'pdf',
                            data: event.target.result,
                            name: file.name
                        });
                        displayFilePreview(file, event.target.result, 'pdf');
                    };
                    reader.readAsDataURL(file);
                }
            });
            pdfInput.value = '';
        }

        // Display file preview
        function displayFilePreview(file, data, type) {
            const previewItem = document.createElement('div');
            previewItem.className = 'preview-item';

            if (type === 'image') {
                previewItem.innerHTML = `
                    <img src="${data}" alt="${file.name}">
                    <button class="remove-file" onclick="removeFile('${file.name}')">×</button>
                `;
            } else if (type === 'pdf') {
                previewItem.innerHTML = `
                    <div class="pdf-preview">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>${file.name}</span>
                    </div>
                    <button class="remove-file" onclick="removeFile('${file.name}')">×</button>
                `;
            }

            filePreview.appendChild(previewItem);
        }

        // Remove file from upload queue
        window.removeFile = function(filename) {
            uploadedFiles = uploadedFiles.filter(f => f.name !== filename);
            const previews = filePreview.querySelectorAll('.preview-item');
            previews.forEach(preview => {
                if (preview.textContent.includes(filename)) {
                    preview.remove();
                }
            });
        };

        // Send message function
        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message && uploadedFiles.length === 0) return;

            // Prepare message content
            let displayMessage = message || 'Analyzing uploaded files...';
            
            // Add user message to chat
            addMessage('user', displayMessage);
            
            // Show file previews in chat if any
            if (uploadedFiles.length > 0) {
                uploadedFiles.forEach(file => {
                    if (file.type === 'image') {
                        addImageToChat(file.data, file.name);
                    } else if (file.type === 'pdf') {
                        addPDFToChat(file.name);
                    }
                });
            }

            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Show typing indicator
            const typingId = addTypingIndicator();

            try {
                const requestBody = {
                    message: message || 'Please analyze these files',
                    user: 'Jakob Brunsell',
                    files: uploadedFiles
                };

                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                removeTypingIndicator(typingId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                addMessage('assistant', data.text || data.response || 'No response received');

            } catch (error) {
                removeTypingIndicator(typingId);
                addMessage('assistant', 'I encountered an error processing your request. Please try again.');
                console.error('Error:', error);
            }

            // Clear uploaded files
            uploadedFiles = [];
            filePreview.innerHTML = '';
        }

        // Add message to chat
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const p = document.createElement('p');
            p.textContent = content;
            
            contentDiv.appendChild(p);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Add image to chat
        function addImageToChat(data, name) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const img = document.createElement('img');
            img.src = data;
            img.alt = name;
            img.style.maxWidth = '300px';
            img.style.borderRadius = '8px';
            
            contentDiv.appendChild(img);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Add PDF indicator to chat
        function addPDFToChat(name) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div style="display: flex; align-items: center; gap: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                    <span>${name}</span>
                </div>
            `;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Add typing indicator
        function addTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant typing';
            typingDiv.id = 'typing-' + Date.now();
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            
            typingDiv.appendChild(contentDiv);
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return typingDiv.id;
        }

        // Remove typing indicator
        function removeTypingIndicator(id) {
            const typingDiv = document.getElementById(id);
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        // Listen for voice messages
        window.addEventListener('addMessage', (event) => {
            const { role, content } = event.detail;
            addMessage(role, content);
        });

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</script>
</body>
</html>
