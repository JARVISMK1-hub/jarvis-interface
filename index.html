<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Interface</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000814">
    <link rel="apple-touch-icon" href="icons/icon-152x152.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #000814 0%, #001d3d 100%);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 20px;
        }

        .logo {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #0096ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.offline {
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: none;
        }

        .status-dot.degraded {
            background: #ffa500;
            box-shadow: 0 0 10px #ffa500;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow: hidden;
        }

        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 29, 61, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header {
                padding: 10px 0;
            }

            .logo {
                font-size: 1.8em;
            }

            .main-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">JARVIS</div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="chat-section">
                <div id="jarvisChatContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // Status monitoring
        let statusCheckInterval;
        const API_URL = 'https://jarvis-backend-j123.onrender.com';

        async function checkBackendStatus() {
            const statusDot = document.getElementById('statusDot');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${API_URL}/health`, {
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    statusDot.className = 'status-dot';
                } else {
                    statusDot.className = 'status-dot degraded';
                }
            } catch (error) {
                statusDot.className = 'status-dot offline';
            }
        }

        // Check status every 30 seconds
        checkBackendStatus();
        statusCheckInterval = setInterval(checkBackendStatus, 30000);

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => console.log('ServiceWorker registered'))
                    .catch(err => console.log('ServiceWorker registration failed'));
            });
        }
    </script>

    <!-- JARVIS Chat Component -->
    <script>
        // JARVIS Chat Component with Full Conversation History
        class JARVISChat {
            constructor(containerId, apiUrl = 'https://jarvis-backend-j123.onrender.com') {
                this.container = document.getElementById(containerId);
                this.apiUrl = apiUrl;
                this.messages = [];
                this.conversationId = this.generateConversationId();
                this.userId = 'sir';
                this.isProcessing = false;
                
                this.init();
            }
            
            generateConversationId() {
                const timestamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0];
                return `conv_${timestamp}`;
            }
            
            init() {
                this.render();
                this.attachEventListeners();
                this.addWelcomeMessage();
            }
            
            render() {
                this.container.innerHTML = `
                    <div class="jarvis-chat-container">
                        <div class="chat-header">
                            <div class="status-indicator active"></div>
                            <span class="chat-title">JARVIS</span>
                            <button class="clear-chat-btn" id="clearChatBtn">Clear</button>
                        </div>
                        
                        <div class="messages-container" id="messagesContainer">
                            <!-- Messages will be inserted here -->
                        </div>
                        
                        <div class="input-container">
                            <textarea 
                                id="messageInput" 
                                placeholder="Speak to JARVIS, Sir..."
                                rows="1"
                            ></textarea>
                            <button id="sendBtn" class="send-btn">
                                <span class="send-icon">➤</span>
                            </button>
                        </div>
                    </div>
                `;
                
                this.addStyles();
            }
            
            addStyles() {
                if (document.getElementById('jarvis-chat-styles')) return;
                
                const style = document.createElement('style');
                style.id = 'jarvis-chat-styles';
                style.textContent = `
                    .jarvis-chat-container {
                        display: flex;
                        flex-direction: column;
                        height: 100%;
                        background: rgba(0, 20, 40, 0.95);
                        border: 1px solid #00d4ff;
                        border-radius: 8px;
                        overflow: hidden;
                    }
                    
                    .chat-header {
                        display: flex;
                        align-items: center;
                        padding: 15px 20px;
                        background: rgba(0, 40, 80, 0.8);
                        border-bottom: 1px solid #00d4ff;
                    }
                    
                    .status-indicator {
                        width: 10px;
                        height: 10px;
                        border-radius: 50%;
                        margin-right: 10px;
                        background: #ff0000;
                    }
                    
                    .status-indicator.active {
                        background: #00ff00;
                        box-shadow: 0 0 10px #00ff00;
                    }
                    
                    .chat-title {
                        color: #00d4ff;
                        font-size: 18px;
                        font-weight: bold;
                        flex: 1;
                    }
                    
                    .clear-chat-btn {
                        background: transparent;
                        border: 1px solid #00d4ff;
                        color: #00d4ff;
                        padding: 5px 15px;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 12px;
                        transition: all 0.3s;
                    }
                    
                    .clear-chat-btn:hover {
                        background: #00d4ff;
                        color: #000;
                    }
                    
                    .messages-container {
                        flex: 1;
                        overflow-y: auto;
                        padding: 20px;
                        display: flex;
                        flex-direction: column;
                        gap: 15px;
                    }
                    
                    .message {
                        display: flex;
                        flex-direction: column;
                        max-width: 80%;
                        animation: fadeIn 0.3s ease-in;
                    }
                    
                    @keyframes fadeIn {
                        from { opacity: 0; transform: translateY(10px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                    
                    .message.user {
                        align-self: flex-end;
                    }
                    
                    .message.assistant {
                        align-self: flex-start;
                    }
                    
                    .message-content {
                        padding: 12px 16px;
                        border-radius: 8px;
                        line-height: 1.5;
                        word-wrap: break-word;
                    }
                    
                    .message.user .message-content {
                        background: rgba(0, 212, 255, 0.2);
                        border: 1px solid #00d4ff;
                        color: #fff;
                    }
                    
                    .message.assistant .message-content {
                        background: rgba(0, 100, 200, 0.2);
                        border: 1px solid #0066cc;
                        color: #fff;
                    }
                    
                    .message-timestamp {
                        font-size: 10px;
                        color: #888;
                        margin-top: 4px;
                        padding: 0 4px;
                    }
                    
                    .message.user .message-timestamp {
                        text-align: right;
                    }
                    
                    .typing-indicator {
                        display: flex;
                        gap: 4px;
                        padding: 12px 16px;
                        background: rgba(0, 100, 200, 0.2);
                        border: 1px solid #0066cc;
                        border-radius: 8px;
                        width: fit-content;
                    }
                    
                    .typing-dot {
                        width: 8px;
                        height: 8px;
                        border-radius: 50%;
                        background: #00d4ff;
                        animation: typing 1.4s infinite;
                    }
                    
                    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
                    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
                    
                    @keyframes typing {
                        0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
                        30% { opacity: 1; transform: scale(1); }
                    }
                    
                    .input-container {
                        display: flex;
                        gap: 10px;
                        padding: 15px 20px;
                        background: rgba(0, 40, 80, 0.8);
                        border-top: 1px solid #00d4ff;
                    }
                    
                    #messageInput {
                        flex: 1;
                        background: rgba(0, 0, 0, 0.5);
                        border: 1px solid #00d4ff;
                        border-radius: 4px;
                        color: #fff;
                        padding: 10px;
                        font-size: 14px;
                        resize: none;
                        font-family: inherit;
                        max-height: 120px;
                    }
                    
                    #messageInput:focus {
                        outline: none;
                        border-color: #00ffff;
                        box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
                    }
                    
                    .send-btn {
                        background: #00d4ff;
                        border: none;
                        border-radius: 4px;
                        width: 50px;
                        cursor: pointer;
                        transition: all 0.3s;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    }
                    
                    .send-btn:hover {
                        background: #00ffff;
                        box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
                    }
                    
                    .send-btn:disabled {
                        background: #555;
                        cursor: not-allowed;
                        opacity: 0.5;
                    }
                    
                    .send-icon {
                        color: #000;
                        font-size: 20px;
                        font-weight: bold;
                    }
                    
                    .messages-container::-webkit-scrollbar {
                        width: 8px;
                    }
                    
                    .messages-container::-webkit-scrollbar-track {
                        background: rgba(0, 0, 0, 0.3);
                    }
                    
                    .messages-container::-webkit-scrollbar-thumb {
                        background: #00d4ff;
                        border-radius: 4px;
                    }
                    
                    .messages-container::-webkit-scrollbar-thumb:hover {
                        background: #00ffff;
                    }
                `;
                
                document.head.appendChild(style);
            }
            
            attachEventListeners() {
                const sendBtn = document.getElementById('sendBtn');
                const messageInput = document.getElementById('messageInput');
                const clearBtn = document.getElementById('clearChatBtn');
                
                sendBtn.addEventListener('click', () => this.sendMessage());
                
                messageInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                
                messageInput.addEventListener('input', (e) => {
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                });
                
                clearBtn.addEventListener('click', () => this.clearConversation());
            }
            
            addWelcomeMessage() {
                this.addMessage('assistant', 'Good day, Sir. JARVIS at your service. How may I assist you?');
            }
            
            addMessage(role, content, timestamp = null) {
                const message = {
                    role: role,
                    content: content,
                    timestamp: timestamp || new Date().toISOString()
                };
                
                this.messages.push(message);
                this.renderMessage(message);
                this.scrollToBottom();
            }
            
            renderMessage(message) {
                const messagesContainer = document.getElementById('messagesContainer');
                
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${message.role}`;
                
                const time = new Date(message.timestamp).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                messageDiv.innerHTML = `
                    <div class="message-content">${this.formatMessage(message.content)}</div>
                    <div class="message-timestamp">${time}</div>
                `;
                
                messagesContainer.appendChild(messageDiv);
            }
            
            formatMessage(content) {
                return content.replace(/\n/g, '<br>');
            }
            
            showTypingIndicator() {
                const messagesContainer = document.getElementById('messagesContainer');
                
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typingIndicator';
                typingDiv.className = 'message assistant';
                typingDiv.innerHTML = `
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                
                messagesContainer.appendChild(typingDiv);
                this.scrollToBottom();
            }
            
            hideTypingIndicator() {
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
            }
            
            scrollToBottom() {
                const messagesContainer = document.getElementById('messagesContainer');
                setTimeout(() => {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 100);
            }
            
            async sendMessage() {
                const messageInput = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const message = messageInput.value.trim();
                
                if (!message || this.isProcessing) return;
                
                this.isProcessing = true;
                sendBtn.disabled = true;
                messageInput.disabled = true;
                
                this.addMessage('user', message);
                
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                this.showTypingIndicator();
                
                try {
                    const response = await fetch(`${this.apiUrl}/api/chat/message`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            messages: this.messages,
                            user_id: this.userId,
                            conversation_id: this.conversationId,
                            use_memory: true
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    this.hideTypingIndicator();
                    this.addMessage('assistant', data.response);
                    
                } catch (error) {
                    console.error('Error sending message:', error);
                    this.hideTypingIndicator();
                    this.addMessage('assistant', 'My apologies, Sir. I encountered an error processing your request. Please try again.');
                } finally {
                    this.isProcessing = false;
                    sendBtn.disabled = false;
                    messageInput.disabled = false;
                    messageInput.focus();
                }
            }
            
            clearConversation() {
                if (!confirm('Clear conversation history? This will start a fresh conversation.')) {
                    return;
                }
                
                this.messages = [];
                this.conversationId = this.generateConversationId();
                
                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '';
                
                this.addWelcomeMessage();
            }
        }

        // Initialize JARVIS Chat when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            window.jarvisChat = new JARVISChat('jarvisChatContainer');
        });
    </script>
</body>
</html>
