<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JARVIS - Just A Rather Very Intelligent System">
    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JARVIS">
    
    <title>JARVIS - AI Assistant</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-192x192.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00d4ff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px #00d4ff;
            letter-spacing: 8px;
        }

        .header p {
            color: #66e0ff;
            margin-top: 10px;
            font-size: 1.1em;
        }

        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
            color: #4ade80;
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }

        .install-prompt {
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .install-prompt.show {
            display: flex;
        }

        .install-button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            color: #0a0e27;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .install-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        .chat-container {
            flex: 1;
            background: rgba(10, 14, 39, 0.8);
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 2px solid #00d4ff;
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: rgba(0, 212, 255, 0.2);
            border-left: 4px solid #00d4ff;
            margin-left: 20%;
        }

        .assistant-message {
            background: rgba(102, 224, 255, 0.1);
            border-left: 4px solid #66e0ff;
            margin-right: 20%;
        }

        .message-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: #00d4ff;
        }

        .message-content {
            color: #e0f7ff;
            line-height: 1.6;
        }

        .image-preview {
            max-width: 300px;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid #00d4ff;
        }

        .pdf-preview {
            background: rgba(0, 212, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid #00d4ff;
            display: inline-block;
        }

        .multi-file-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .file-badge {
            background: rgba(0, 212, 255, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #00d4ff;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-badge-remove {
            cursor: pointer;
            color: #ff4444;
            font-weight: bold;
            margin-left: 8px;
        }

        .file-badge-remove:hover {
            color: #ff6666;
        }

        .input-container {
            display: flex;
            gap: 10px;
            background: rgba(10, 14, 39, 0.8);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #00d4ff;
        }

        .file-upload-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-upload-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.8);
        }

        .file-upload-btn:hover .arc-reactor {
            animation: reactorPulse 1s ease-in-out infinite;
        }

        /* Arc Reactor Design */
        .arc-reactor {
            width: 40px;
            height: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arc-reactor-core {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ffffff 0%, #00d4ff 50%, #0099cc 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 10px #00d4ff,
                0 0 20px #00d4ff,
                0 0 30px #00d4ff,
                inset 0 0 10px rgba(255, 255, 255, 0.5);
            position: absolute;
            z-index: 3;
        }

        .arc-reactor-ring {
            width: 36px;
            height: 36px;
            border: 2px solid #00d4ff;
            border-radius: 50%;
            position: absolute;
            box-shadow: 
                0 0 5px #00d4ff,
                inset 0 0 5px #00d4ff;
            z-index: 2;
        }

        .arc-reactor-outer {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(0, 212, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            z-index: 1;
        }

        .arc-reactor-line {
            position: absolute;
            width: 2px;
            height: 20px;
            background: linear-gradient(to bottom, transparent, #00d4ff, transparent);
            left: 50%;
            top: 50%;
            transform-origin: center;
            z-index: 2;
        }

        .arc-reactor-line:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); }
        .arc-reactor-line:nth-child(2) { transform: translate(-50%, -50%) rotate(45deg); }
        .arc-reactor-line:nth-child(3) { transform: translate(-50%, -50%) rotate(90deg); }
        .arc-reactor-line:nth-child(4) { transform: translate(-50%, -50%) rotate(135deg); }

        @keyframes reactorPulse {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.1);
                filter: brightness(1.3);
            }
        }

        .file-count-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 10;
        }

        #messageInput {
            flex: 1;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            color: #e0f7ff;
            padding: 15px;
            border-radius: 10px;
            font-size: 1em;
            outline: none;
        }

        #messageInput::placeholder {
            color: #66e0ff;
        }

        #sendButton {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            color: #0a0e27;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        #sendButton:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.8);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            background: rgba(0, 212, 255, 0.2);
            border: 2px solid #00d4ff;
            display: none;
            z-index: 1000;
        }

        .status-indicator.show {
            display: block;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 10px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #66e0ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Install Prompt -->
        <div class="install-prompt" id="installPrompt">
            <span>📱 Install JARVIS as an app for quick access</span>
            <button class="install-button" id="installButton">Install</button>
        </div>

        <div class="header">
            <h1>JARVIS</h1>
            <p id="greeting">Good Morning, Sir</p>
            <span class="status-badge" id="statusBadge">🟢 Cloud Connected</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant-message">
                <div class="message-header">JARVIS</div>
                <div class="message-content" id="initialGreeting">Good day, Sir. All systems online. How may I assist you today?</div>
            </div>
        </div>

        <div class="input-container">
            <label for="fileInput" class="file-upload-btn">
                <div class="arc-reactor">
                    <div class="arc-reactor-outer"></div>
                    <div class="arc-reactor-ring"></div>
                    <div class="arc-reactor-line"></div>
                    <div class="arc-reactor-line"></div>
                    <div class="arc-reactor-line"></div>
                    <div class="arc-reactor-line"></div>
                    <div class="arc-reactor-core"></div>
                </div>
                <span class="file-count-badge" id="fileCountBadge" style="display: none;">0</span>
            </label>
            <input type="file" id="fileInput" accept="image/*,.pdf" multiple style="display: none;">
            <input type="text" id="messageInput" placeholder="Speak to JARVIS..." />
            <button id="sendButton">Send</button>
        </div>

        <div id="selectedFilesPreview" class="multi-file-container" style="padding: 10px; display: none;"></div>
    </div>

    <div class="status-indicator" id="statusIndicator"></div>

    <script src="app.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('JARVIS: Service Worker registered successfully:', registration.scope);
                    })
                    .catch(error => {
                        console.log('JARVIS: Service Worker registration failed:', error);
                    });
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        const installPrompt = document.getElementById('installPrompt');
        const installButton = document.getElementById('installButton');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installPrompt.classList.add('show');
        });

        installButton.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`JARVIS: User response to install prompt: ${outcome}`);
                deferredPrompt = null;
                installPrompt.classList.remove('show');
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('JARVIS: PWA installed successfully');
            installPrompt.classList.remove('show');
        });

        // API Configuration
        const API_URL = 'https://jarvis-backend-j123.onrender.com/api/chat';
        let conversationId = null;
        let selectedFiles = [];

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const fileInput = document.getElementById('fileInput');
        const statusIndicator = document.getElementById('statusIndicator');
        const fileCountBadge = document.getElementById('fileCountBadge');
        const selectedFilesPreview = document.getElementById('selectedFilesPreview');
        const statusBadge = document.getElementById('statusBadge');

        // Set time-based greeting
        function setGreeting() {
            const now = new Date();
            const hour = now.getHours();
            const greetingElement = document.getElementById('greeting');
            const initialGreeting = document.getElementById('initialGreeting');
            
            let greeting;
            let initialMessage;
            
            if (hour >= 5 && hour < 12) {
                greeting = "Good Morning, Sir";
                initialMessage = "Good morning, Sir. All systems online. How may I assist you today?";
            } else if (hour >= 12 && hour < 18) {
                greeting = "Good Afternoon, Sir";
                initialMessage = "Good afternoon, Sir. All systems online. How may I assist you today?";
            } else {
                greeting = "Good Evening, Sir";
                initialMessage = "Good evening, Sir. All systems online. How may I assist you today?";
            }
            
            greetingElement.textContent = greeting;
            initialGreeting.textContent = initialMessage;
        }

        // Test connection on load
        async function testConnection() {
            try {
                const response = await fetch('https://jarvis-backend-j123.onrender.com/health');
                if (response.ok) {
                    statusBadge.textContent = '🟢 Cloud Connected';
                    statusBadge.classList.remove('offline');
                } else {
                    statusBadge.textContent = '🔴 Connection Failed';
                    statusBadge.classList.add('offline');
                }
            } catch (error) {
                statusBadge.textContent = '🔴 Offline';
                statusBadge.classList.add('offline');
            }
        }

        // Initialize
        setGreeting();
        testConnection();

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            selectedFiles = [...selectedFiles, ...files];
            updateFilePreview();
            e.target.value = '';
        });

        // Update file preview
        function updateFilePreview() {
            if (selectedFiles.length === 0) {
                selectedFilesPreview.style.display = 'none';
                fileCountBadge.style.display = 'none';
                return;
            }

            selectedFilesPreview.style.display = 'flex';
            fileCountBadge.style.display = 'flex';
            fileCountBadge.textContent = selectedFiles.length;

            selectedFilesPreview.innerHTML = selectedFiles.map((file, index) => {
                const icon = file.type.includes('pdf') ? '📄' : '🖼️';
                const size = (file.size / 1024).toFixed(1) + ' KB';
                return `
                    <div class="file-badge">
                        <span>${icon}</span>
                        <span>${file.name}</span>
                        <span style="color: #66e0ff; font-size: 0.85em;">(${size})</span>
                        <span class="file-badge-remove" onclick="removeFile(${index})">✕</span>
                    </div>
                `;
            }).join('');
        }

        // Remove file from selection
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFilePreview();
        };

        // Show status message
        function showStatus(message, duration = 3000) {
            statusIndicator.textContent = message;
            statusIndicator.classList.add('show');
            setTimeout(() => {
                statusIndicator.classList.remove('show');
            }, duration);
        }

        // Add message to chat
        function addMessage(role, content, files = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            let fileHTML = '';
            
            if (files.length > 0) {
                fileHTML = '<div class="multi-file-container">';
                files.forEach(file => {
                    if (file.type === 'image') {
                        fileHTML += `<img src="${file.data}" class="image-preview" alt="Uploaded image">`;
                    } else if (file.type === 'pdf') {
                        fileHTML += `
                            <div class="pdf-preview">
                                <span class="pdf-icon">📄</span>
                                <div class="pdf-info">
                                    <div class="pdf-name">${file.name}</div>
                                    <div class="pdf-size">${file.size}</div>
                                </div>
                            </div>
                        `;
                    }
                });
                fileHTML += '</div>';
            }
            
            messageDiv.innerHTML = `
                <div class="message-header">${role === 'user' ? 'You' : 'JARVIS'}</div>
                <div class="message-content">${content}${fileHTML}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Process files
        async function processFiles() {
            const processedFiles = [];
            
            for (const file of selectedFiles) {
                if (file.type.startsWith('image/')) {
                    const base64 = await fileToBase64(file);
                    processedFiles.push({
                        type: 'image',
                        data: base64,
                        name: file.name,
                        size: formatFileSize(file.size)
                    });
                } else if (file.type === 'application/pdf') {
                    const base64 = await fileToBase64(file);
                    processedFiles.push({
                        type: 'pdf',
                        data: base64,
                        name: file.name,
                        size: formatFileSize(file.size)
                    });
                }
            }
            
            return processedFiles;
        }

        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Send message
        async function sendMessage() {
            const message = messageInput.value.trim();
            const hasFiles = selectedFiles.length > 0;
            
            if (!message && !hasFiles) return;

            const processedFiles = await processFiles();
            const displayMessage = message || `Analyze these ${selectedFiles.length} file(s)`;
            
            addMessage('user', displayMessage, processedFiles);
            
            messageInput.value = '';
            const filesToSend = [...selectedFiles];
            selectedFiles = [];
            updateFilePreview();
            
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';

            try {
                const requestData = {
                    message: message || `Please analyze these ${filesToSend.length} files and provide a comprehensive summary.`,
                    conversation_id: conversationId
                };

                if (processedFiles.length > 0) {
                    requestData.files = processedFiles.map(f => ({
                        type: f.type,
                        data: f.data,
                        name: f.name
                    }));
                }

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.conversation_id) {
                    conversationId = data.conversation_id;
                }
                
                addMessage('assistant', data.response || 'I apologize, but I encountered an issue processing your request.');
                
                showStatus('Message sent successfully!');
                
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `I apologize, Sir. I'm experiencing technical difficulties: ${error.message}`);
                showStatus('Error sending message', 5000);
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial status
        showStatus('JARVIS systems online', 2000);
    </script>
</body>
</html>
